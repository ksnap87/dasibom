name: Build APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      # docs-only 변경엔 빌드 스킵 (CI 시간 절약)
      # 강제 빌드 필요 시 workflow_dispatch 수동 트리거 사용
      - '**.md'
      - 'docs/**'
      - 'storyboard/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Create config.ts from secret
        working-directory: mobile/src
        run: echo "${{ secrets.CONFIG_TS }}" > config.ts

      - name: Create google-services.json from secret
        working-directory: mobile/android/app
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Decode release keystore
        working-directory: mobile/android/app
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > dasibom-release.keystore

      - name: Create gradle.properties for CI
        # 로컬 gradle.properties는 .gitignore 대상 (signing credential 보호)이라 CI에선 없음.
        # 여기서 빌드 설정만 주입하고, signing은 -PRELEASE_* 플래그로 전달함.
        working-directory: mobile/android
        run: |
          cat > gradle.properties <<'PROPS'
          org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8
          android.useAndroidX=true
          reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
          newArchEnabled=true
          hermesEnabled=true
          edgeToEdgeEnabled=false
          android.useFullClasspathForDexingTransform=true
          PROPS
          echo "=== gradle.properties 생성 완료 ==="
          cat gradle.properties

      - name: Grant execute permission for gradlew
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build Release APK + AAB
        working-directory: mobile/android
        env:
          # GH Actions ubuntu-latest 러너 16GB RAM. 기본 2GB 로는 RN 0.84 + newArch 빌드
          # 시 JVM GC thrashing 으로 daemon 중단됨 → 6GB 할당.
          GRADLE_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace \
            -PRELEASE_STORE_FILE=dasibom-release.keystore \
            -PRELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }} \
            -PRELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -PRELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx6144m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" \
            2>&1 | tee /tmp/build-output.txt
        id: build

      - name: Post build error to issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('/tmp/build-output.txt', 'utf8');
            } catch(e) {
              log = 'Could not read build output';
            }
            // Get last 200 lines
            const lines = log.split('\n');
            const tail = lines.slice(-200).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failure: ${context.sha.substring(0, 7)}`,
              body: `## Build Error Log (last 200 lines)\n\`\`\`\n${tail}\n\`\`\`\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Find build artifacts
        id: apk
        run: |
          echo "=== Searching for APK files ==="
          APK=$(find mobile/android -name "*.apk" -type f 2>/dev/null | head -1)
          AAB=$(find mobile/android -name "*.aab" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ] && [ -z "$AAB" ]; then
            echo "❌ No build artifacts found!"
            ls -laR mobile/android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
            exit 1
          fi
          echo "Found APK: $APK"
          echo "Found AAB: $AAB"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT

      - name: Get version name
        id: version
        run: |
          VERSION=$(node -e "const p=require('./mobile/package.json'); console.log(p.version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Upload artifacts to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_TS: ${{ github.event.head_commit.timestamp }}
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          APK_PATH: ${{ steps.apk.outputs.apk_path }}
          AAB_PATH: ${{ steps.apk.outputs.aab_path }}
        run: |
          FILES=""
          [ -n "$APK_PATH" ] && FILES="$FILES $APK_PATH"
          [ -n "$AAB_PATH" ] && FILES="$FILES $AAB_PATH"
          NOTES=$(cat <<EOF
          ## 다시봄 자동 빌드

          **빌드 시각**: $COMMIT_TS
          **커밋**: $COMMIT_SHA
          **메시지**:
          $COMMIT_MSG

          ### 설치 방법
          1. app-release.apk 다운로드
          2. 안드로이드 설정 → 알 수 없는 앱 설치 허용
          3. APK 파일 실행하여 설치
          EOF
          )
          gh release create "$RELEASE_TAG" \
            $FILES \
            --title "다시봄 $RELEASE_TAG" \
            --notes "$NOTES"
