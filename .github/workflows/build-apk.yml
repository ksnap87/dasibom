name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # žąėŽŹô žč§ŪĖČ Ž≤ĄŪäľ

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Create config.ts from secret
        working-directory: mobile/src
        run: echo "${{ secrets.CONFIG_TS }}" > config.ts

      - name: Create google-services.json from secret
        working-directory: mobile/android/app
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Decode release keystore
        working-directory: mobile/android/app
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > dasibom-release.keystore

      - name: Grant execute permission for gradlew
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PRELEASE_STORE_FILE=dasibom-release.keystore \
            -PRELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }} \
            -PRELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -PRELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }} \
            2>&1 | tee /tmp/build-output.txt
        id: build

      - name: Post build error to issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('/tmp/build-output.txt', 'utf8');
            } catch(e) {
              log = 'Could not read build output';
            }
            // Get last 200 lines
            const lines = log.split('\n');
            const tail = lines.slice(-200).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failure: ${context.sha.substring(0, 7)}`,
              body: `## Build Error Log (last 200 lines)\n\`\`\`\n${tail}\n\`\`\`\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Find APK file
        id: apk
        run: |
          APK=$(find mobile/android/app/build/outputs -name "*.apk" -type f | head -1)
          echo "Found APK: $APK"
          ls -la "$APK"
          echo "path=$APK" >> $GITHUB_OUTPUT

      - name: Get version name
        id: version
        run: |
          VERSION=$(node -e "const p=require('./mobile/package.json'); console.log(p.version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Upload APK to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.apk.outputs.path }}" \
            --title "Žč§žčúŽīĄ ${{ steps.version.outputs.tag }}" \
            --notes "## Žč§žčúŽīĄ žěźŽŹô ŽĻĆŽďú

          **ŽĻĆŽďú žčúÍįĀ**: ${{ github.event.head_commit.timestamp }}
          **žĽ§Žįč**: ${{ github.sha }}
          **Ž©ĒžčúžßÄ**: ${{ github.event.head_commit.message }}

          ### žĄ§žĻė Žį©Ž≤ē
          1. \`app-release.apk\` Žč§žöīŽ°úŽďú
          2. žēąŽďúŽ°úžĚīŽďú žĄ§ž†ē ‚Üí žēĆ žąė žóÜŽäĒ žēĪ žĄ§žĻė Ūóąžö©
          3. APK ŪĆĆžĚľ žč§ŪĖČŪēėžó¨ žĄ§žĻė"
